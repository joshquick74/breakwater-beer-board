kind = "web"
previewPath = "/"
title = "Beer Board"
version = "1.0.0"
id = "artifacts/beer-board"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19289
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/beer-board run dev"

[services.env]
PORT = "19289"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/beer-board", "run", "build"]
publicDir = "artifacts/beer-board/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
